name: Build & Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Verify web build files
        run: |
          echo "=== Web build files ==="
          ls -lh web/
          for f in index.html love.js love.wasm game.js game.data; do
            if [ ! -f "web/$f" ]; then
              echo "MISSING: web/$f"
              exit 1
            fi
          done
          echo "All required files present"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
