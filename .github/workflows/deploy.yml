name: Build & Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install love.js (non-pthread version)
        run: |
          npm install -g love.js@0.9.0 || npm install -g love.js
          echo "love.js version: $(love.js --version 2>/dev/null || echo unknown)"

      - name: Create .love package
        run: |
          zip -9 -r hicret.love . \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "web/*" \
            --exclude "*.sh" \
            --exclude "*.zip" \
            --exclude "*.love" \
            --exclude "*.md" \
            --exclude "build_web/*"
          echo "Package size: $(du -sh hicret.love | cut -f1)"

      - name: Build with love.js
        run: |
          love.js hicret.love dist --title "Hicret" --memory 67108864
          ls -lh dist/

      - name: Ensure single-threaded compatibility
        run: |
          cd dist
          if [ -f love.worker.js ]; then
            echo "=== Pthread build detected ==="
            echo "Patching love.js to stub out Worker creation..."
            # Replace 'new Worker(' with a stub that returns a fake worker
            node -e "
              const fs = require('fs');
              let src = fs.readFileSync('love.js', 'utf8');
              // Inject worker stub at the very beginning
              const stub = '(function(){var _W=self.Worker;self.Worker=function(u,o){var w=new EventTarget();w.postMessage=function(){};w.terminate=function(){};w.onmessage=null;return w;};})();';
              src = stub + src;
              fs.writeFileSync('love.js', src);
              console.log('Worker stub injected');
            "
            echo "Patch complete"
          else
            echo "No pthread build — no patching needed"
          fi
          ls -lh
          cd ..

      - name: Apply custom web files
        run: |
          cp web/index.html dist/index.html
          cp web/coi-serviceworker.min.js dist/coi-serviceworker.min.js
          echo "Custom files applied"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
